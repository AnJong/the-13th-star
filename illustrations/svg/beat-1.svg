<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Beat 1 — 가을 저녁 마당, 청록 별똥별이 그어진다">
  <defs>
    <linearGradient id="b1-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1428"/>
      <stop offset="0.45" stop-color="#3d2f4a"/>
      <stop offset="0.7" stop-color="#6b5b73"/>
      <stop offset="1" stop-color="#2a1f33"/>
    </linearGradient>
    <radialGradient id="b1-window" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5d99c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f5d99c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b1-streak" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8d4f5" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a8d4f5" stop-opacity="1"/>
      <stop offset="1" stop-color="#a8d4f5" stop-opacity="0"/>
    </linearGradient>
    <filter id="b1-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="800" height="450" fill="url(#b1-sky)"/>

  <!-- distant stars -->
  <g fill="#e8e6e1" opacity="0.5">
    <circle cx="120" cy="60" r="0.8"/>
    <circle cx="220" cy="40" r="0.6"/>
    <circle cx="340" cy="80" r="1"/>
    <circle cx="500" cy="50" r="0.7"/>
    <circle cx="640" cy="100" r="0.9"/>
    <circle cx="710" cy="140" r="0.6"/>
    <circle cx="380" cy="120" r="0.5"/>
    <circle cx="180" cy="170" r="0.6"/>
  </g>

  <!-- meteor / 청록 별똥별 -->
  <g filter="url(#b1-glow)">
    <line x1="540" y1="80" x2="640" y2="200" stroke="url(#b1-streak)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="640" cy="200" r="2.5" fill="#a8d4f5"/>
  </g>

  <!-- distant hill -->
  <path d="M 0 320 Q 200 280 400 310 Q 600 340 800 300 L 800 450 L 0 450 Z" fill="#0f0d12"/>

  <!-- house silhouette (right) -->
  <g fill="#0a0a0d">
    <rect x="600" y="280" width="180" height="100"/>
    <polygon points="600,280 690,235 780,280"/>
  </g>

  <!-- window glow -->
  <ellipse cx="660" cy="320" rx="40" ry="28" fill="url(#b1-window)"/>
  <rect x="640" y="305" width="40" height="30" fill="#f5d99c" opacity="0.85"/>

  <!-- garden ground -->
  <rect x="0" y="380" width="800" height="70" fill="#0d0c10"/>

  <!-- 평상 (low wooden platform) -->
  <g>
    <rect x="170" y="370" width="160" height="14" fill="#4a3a2a" rx="2"/>
    <rect x="178" y="384" width="6" height="20" fill="#3a2c20"/>
    <rect x="316" y="384" width="6" height="20" fill="#3a2c20"/>
    <!-- sketchbook on top -->
    <rect x="200" y="362" width="50" height="34" fill="#e8e6e1" opacity="0.85"/>
    <line x1="225" y1="362" x2="225" y2="396" stroke="#8a8680" stroke-width="0.5"/>
  </g>

  <!-- girl looking up (silhouette only) -->
  <g fill="#0a0a0d">
    <!-- body -->
    <ellipse cx="260" cy="350" rx="14" ry="22"/>
    <!-- head looking up -->
    <circle cx="260" cy="318" r="11"/>
    <!-- arm holding pencil -->
    <line x1="270" y1="335" x2="285" y2="320" stroke="#0a0a0d" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- pencil teal -->
  <line x1="285" y1="320" x2="293" y2="312" stroke="#a8d4f5" stroke-width="2" stroke-linecap="round"/>

  <!-- subtle film grain via dots (optional, sparse) -->
  <g fill="#ffffff" opacity="0.02">
    <circle cx="100" cy="200" r="0.5"/>
    <circle cx="450" cy="180" r="0.5"/>
    <circle cx="280" cy="120" r="0.5"/>
  </g>
</svg>
