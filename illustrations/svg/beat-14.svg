<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Beat 14 — 새벽 호송 차 안. 별이의 청록빛. 백미러에 추격 헤드라이트.">
  <defs>
    <linearGradient id="b14-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.5" stop-color="#0d1320"/>
      <stop offset="1" stop-color="#08080d"/>
    </linearGradient>
    <radialGradient id="b14-byeori" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a8d4f5" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#7ba0b8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a8d4f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b14-headlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#f5d99c" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f5d99c" stop-opacity="0"/>
    </radialGradient>
    <filter id="b14-soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#b14-bg)"/>

  <!-- pre-dawn far horizon hint -->
  <ellipse cx="400" cy="450" rx="600" ry="80" fill="#1a1a2a" opacity="0.6"/>

  <!-- distant pursuit headlights (small, paired) -->
  <g>
    <circle cx="120" cy="270" r="8" fill="url(#b14-headlight)" filter="url(#b14-soft)"/>
    <circle cx="135" cy="270" r="8" fill="url(#b14-headlight)" filter="url(#b14-soft)"/>
    <circle cx="120" cy="270" r="2" fill="#fff" opacity="0.85"/>
    <circle cx="135" cy="270" r="2" fill="#fff" opacity="0.85"/>
  </g>

  <!-- road perspective (subtle) -->
  <path d="M 0 320 L 800 350 L 800 360 L 0 330 Z" fill="#1a1a22" opacity="0.5"/>

  <!-- car silhouette (interior view from behind/side) -->
  <g>
    <!-- car body outline -->
    <path d="M 200 200 L 700 200 L 720 240 L 720 380 L 200 380 L 180 240 Z" fill="#0a0a12" stroke="#2a2a3a" stroke-width="1"/>

    <!-- windshield -->
    <path d="M 220 210 L 680 210 L 695 240 L 690 290 L 210 290 L 215 240 Z" fill="#0d1015" opacity="0.85"/>

    <!-- side window (driver) -->
    <rect x="540" y="220" width="140" height="60" fill="#0d1015" opacity="0.6" rx="2"/>

    <!-- side window (passenger) -->
    <rect x="220" y="220" width="140" height="60" fill="#0d1015" opacity="0.6" rx="2"/>

    <!-- dashboard glow (instrument panel) -->
    <ellipse cx="450" cy="340" rx="200" ry="20" fill="#a8d4f5" opacity="0.05"/>
    <line x1="350" y1="340" x2="550" y2="340" stroke="#a8d4f5" stroke-width="0.5" opacity="0.3"/>

    <!-- driver silhouette (father) -->
    <g fill="#000">
      <ellipse cx="600" cy="280" rx="22" ry="35"/>
      <circle cx="600" cy="245" r="13"/>
      <!-- hands on wheel -->
      <ellipse cx="585" cy="320" rx="6" ry="3"/>
      <ellipse cx="615" cy="320" rx="6" ry="3"/>
    </g>

    <!-- passenger (mother) -->
    <g fill="#000">
      <ellipse cx="290" cy="285" rx="20" ry="30"/>
      <circle cx="290" cy="252" r="12"/>
    </g>

    <!-- back seat — daughter holding alien (on lap) -->
    <g>
      <!-- daughter outline -->
      <ellipse cx="320" cy="370" rx="18" ry="14" fill="#000"/>
      <circle cx="320" cy="345" r="10" fill="#000"/>

      <!-- alien (glowing teal) on her lap -->
      <ellipse cx="320" cy="370" rx="18" ry="14" fill="url(#b14-byeori)" opacity="0.9"/>
      <circle cx="320" cy="368" r="8" fill="url(#b14-byeori)"/>
      <!-- internal particles -->
      <circle cx="318" cy="365" r="0.8" fill="#ffe6a7" opacity="0.85"/>
      <circle cx="323" cy="370" r="0.7" fill="#ffe6a7" opacity="0.8"/>
      <circle cx="320" cy="375" r="0.9" fill="#ffe6a7" opacity="0.9"/>
    </g>

    <!-- son in back, with laptop -->
    <g>
      <ellipse cx="500" cy="370" rx="18" ry="14" fill="#000"/>
      <circle cx="500" cy="345" r="10" fill="#000"/>
      <!-- laptop screen glow -->
      <rect x="480" y="370" width="40" height="22" fill="#a8d4f5" opacity="0.4" rx="1"/>
    </g>
  </g>

  <!-- rearview mirror with reflected pursuit lights -->
  <g>
    <rect x="370" y="200" width="60" height="22" fill="#0a0a12" stroke="#2a2a3a" stroke-width="0.5" rx="2"/>
    <!-- reflected lights (smaller) -->
    <circle cx="385" cy="211" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="395" cy="211" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="385" cy="211" r="4" fill="#f5d99c" opacity="0.2"/>
    <circle cx="395" cy="211" r="4" fill="#f5d99c" opacity="0.2"/>
  </g>
</svg>
