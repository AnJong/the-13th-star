<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>13번째 별</title>
    <meta name="description" content="가을, 김포의 어느 단독주택. 작은 외계 생명체가 떨어진다." />
    <meta name="theme-color" content="#0a0a0d" />

    <meta property="og:title" content="13번째 별" />
    <meta property="og:description" content="가을, 김포의 어느 단독주택." />
    <meta property="og:type" content="article" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
      defer
    ></script>
    <script src="data.js" defer></script>
    <script src="animations.js" defer></script>

    <style>
      /* ==== 리셋 ==== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0d;
        --fg: #e8e6e1;
        --fg-dim: #8a8680;
        --family: #f5d99c;
        --alien: #9bc0d4;
        --alien-bg: #0f1418;
        --team: #c8c8d0;
        --team-bg: #0d0f12;
        --accent: #a8d4f5;
        --max-width: 640px;
        --pad: 1.25rem;
      }

      html,
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: "Pretendard Variable", Pretendard, -apple-system,
          BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 17px;
        line-height: 1.85;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      body {
        scroll-snap-type: y proximity;
        overflow-y: scroll;
        height: 100vh;
        height: 100dvh;
        scroll-behavior: smooth;
        overscroll-behavior: contain;
      }

      /* ==== 진행 바 ==== */
      .progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--family));
        width: 0%;
        z-index: 100;
        transition: width 0.1s linear;
        pointer-events: none;
      }

      /* ==== 비트 섹션 ==== */
      .beat,
      .cover {
        min-height: 100vh;
        min-height: 100dvh;
        padding: 5rem var(--pad) 6rem;
        max-width: var(--max-width);
        margin: 0 auto;
        scroll-snap-align: start;
        scroll-snap-stop: normal;
      }

      .cover {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: var(--pad);
        gap: 1rem;
        position: relative;
      }

      .cover h1 {
        font-size: clamp(3rem, 13vw, 5.5rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        background: linear-gradient(180deg, var(--fg) 60%, var(--accent) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .cover .sub {
        color: var(--fg-dim);
        font-size: 0.95rem;
        letter-spacing: 0.1em;
      }

      .cover .scroll-hint {
        position: absolute;
        bottom: 3rem;
        font-size: 0.8rem;
        color: var(--fg-dim);
        animation: hint 2.4s ease-in-out infinite;
        letter-spacing: 0.15em;
      }

      @keyframes hint {
        0%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(6px);
        }
      }

      .beat {
        display: flex;
        flex-direction: column;
      }

      .beat-header {
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .beat-num {
        font-size: 0.78rem;
        letter-spacing: 0.25em;
        color: var(--fg-dim);
        text-transform: uppercase;
        font-weight: 500;
      }

      .beat-title {
        font-size: 1.55rem;
        font-weight: 600;
        margin-top: 0.4rem;
        color: var(--fg);
        letter-spacing: -0.02em;
        line-height: 1.3;
      }

      .column {
        margin-bottom: 2.5rem;
      }
      .column:last-child {
        margin-bottom: 0;
      }

      .column-label {
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        padding-left: 0.75rem;
        border-left: 2px solid currentColor;
        font-weight: 600;
      }

      .col-family .column-label {
        color: var(--family);
      }
      .col-alien .column-label {
        color: var(--alien);
      }
      .col-team .column-label {
        color: var(--team);
      }

      .column p {
        margin-bottom: 1.15rem;
        font-size: 1rem;
      }
      .column p:last-child {
        margin-bottom: 0;
      }

      /* 가족: 따뜻한 본문 */
      .col-family {
        color: var(--fg);
      }

      /* 외계인: 분석 보고 톤 */
      .col-alien {
        color: var(--alien);
        background: var(--alien-bg);
        padding: 1.5rem 1.25rem;
        margin-left: calc(-1 * var(--pad) + 0.5rem);
        margin-right: calc(-1 * var(--pad) + 0.5rem);
        border-radius: 0.5rem;
        font-size: 0.92rem;
        line-height: 1.75;
      }
      .col-alien em {
        color: #c8e2ee;
        font-style: italic;
      }

      /* 추적팀: 콘솔/로그 톤 */
      .col-team {
        color: var(--team);
        background: var(--team-bg);
        padding: 1.5rem 1.25rem;
        margin-left: calc(-1 * var(--pad) + 0.5rem);
        margin-right: calc(-1 * var(--pad) + 0.5rem);
        border-radius: 0.5rem;
        font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.85rem;
        line-height: 1.75;
      }
      .col-team .timestamp {
        display: block;
        color: var(--accent);
        margin-bottom: 0.6rem;
        font-size: 0.76rem;
        letter-spacing: 0.05em;
      }

      /* 인용·강조 */
      em {
        font-style: italic;
        color: var(--accent);
      }
      strong {
        font-weight: 700;
        color: #fff;
      }

      /* 키네틱 강조 */
      .kinetic {
        display: inline-block;
        font-weight: 700;
        color: var(--accent);
      }

      /* 텍스트 애니메이션 단어 wrapper */
      .fx-w {
        display: inline-block;
        will-change: opacity, transform, filter;
      }

      /* 키워드별 변조 */
      .fx-w.kw-name {
        color: var(--accent);
        font-weight: 600;
      }
      .fx-w.kw-number {
        font-weight: 700;
        color: var(--family);
        font-variant-numeric: tabular-nums;
      }
      .fx-w.kw-truth {
        font-weight: 700;
        color: #ffe6a7;
        text-shadow: 0 0 12px rgba(245, 217, 156, 0.4);
        letter-spacing: 0.02em;
      }
      .fx-w.kw-emotion {
        font-weight: 700;
        font-style: italic;
        color: #ffb8b0;
      }

      /* 가족 컬럼 안에서는 인물명 색을 가족 톤으로 */
      .col-family .fx-w.kw-name {
        color: var(--family);
      }

      /* 추적팀 콘솔에서는 모든 키워드를 모노톤 청록으로 */
      .col-team .fx-w.kw-name,
      .col-team .fx-w.kw-truth,
      .col-team .fx-w.kw-number {
        color: var(--accent);
        text-shadow: none;
      }

      strong {
        display: inline-block;
        will-change: transform, opacity, letter-spacing;
        color: #fff;
        text-shadow: 0 0 16px rgba(168, 212, 245, 0.5);
      }

      /* 가족 컬럼에서 strong */
      .col-family strong {
        color: #fff5d8;
        text-shadow: 0 0 18px rgba(245, 217, 156, 0.6);
      }

      /* 추적팀 콘솔에서 strong */
      .col-team strong {
        color: var(--accent);
        text-shadow: 0 0 10px rgba(168, 212, 245, 0.7);
      }

      /* 푸터 */
      .end {
        text-align: center;
        padding: 6rem var(--pad);
        color: var(--fg-dim);
        font-size: 0.85rem;
        scroll-snap-align: start;
        min-height: 60vh;
        min-height: 60dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0.5rem;
      }

      /* ==== PC 확장 ==== */
      @media (min-width: 768px) {
        :root {
          --pad: 2rem;
          --max-width: 720px;
        }
        html,
        body {
          font-size: 18px;
        }
        .beat-title {
          font-size: 2rem;
        }
        .col-alien,
        .col-team {
          padding: 2rem;
        }
      }

      @media (min-width: 1024px) {
        :root {
          --max-width: 760px;
        }
      }

      /* ==== 모션 감소 ==== */
      @media (prefers-reduced-motion: reduce) {
        body {
          scroll-snap-type: none;
          scroll-behavior: auto;
        }
        .scroll-hint {
          animation: none;
        }
        .clock-hand {
          animation: none !important;
        }
      }

            /* ==== 일러스트 ==== */
      .beat-illustration {
        margin: 0 calc(-1 * var(--pad)) 2rem;
        border-radius: 0;
        overflow: hidden;
        position: relative;
      }
      .beat-illustration img {
        display: block;
        width: 100%;
        height: auto;
        max-height: 60vh;
        object-fit: cover;
      }
      .beat-illustration figcaption {
        font-size: 0.78rem;
        color: var(--fg-dim);
        text-align: center;
        padding: 0.5rem var(--pad);
        font-style: italic;
      }
      .beat-illustration::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          transparent 60%,
          rgba(10, 10, 13, 0.4) 100%
        );
        pointer-events: none;
      }
      @media (min-width: 768px) {
        .beat-illustration {
          margin: 0 0 2rem;
          border-radius: 0.5rem;
        }
      }

      /* ==== 비트 카운터 (우측 상단) ==== */
      .beat-counter {
        position: fixed;
        top: 1rem;
        right: 1rem;
        font-size: 0.72rem;
        color: var(--fg-dim);
        letter-spacing: 0.15em;
        z-index: 90;
        font-variant-numeric: tabular-nums;
        background: rgba(10, 10, 13, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 0.4rem 0.7rem;
        border-radius: 0.3rem;
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .beat-counter.visible {
        opacity: 1;
      }

      /* ==== 추적팀 SVG 시계 ==== */
      .team-clock {
        margin-top: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.72rem;
        color: var(--accent);
        opacity: 0.75;
        letter-spacing: 0.1em;
      }
      .team-clock svg {
        width: 18px;
        height: 18px;
      }
      .team-clock .clock-hand {
        transform-origin: 12px 12px;
        animation: clockTick 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes clockTick {
        0%,
        24% {
          transform: rotate(0deg);
        }
        25%,
        49% {
          transform: rotate(90deg);
        }
        50%,
        74% {
          transform: rotate(180deg);
        }
        75%,
        99% {
          transform: rotate(270deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* ==== 추적팀 EM 파형 ==== */
      .team-waveform {
        margin-top: 0.8rem;
        display: block;
        width: 100%;
        height: 24px;
        opacity: 0.5;
      }
      .team-waveform path {
        fill: none;
        stroke: var(--accent);
        stroke-width: 1;
        stroke-linecap: round;
      }
    </style>
  </head>
  <body>
    <div class="progress" id="progress"></div>
    <div class="beat-counter" id="beatCounter">— / 16</div>

    <section class="cover">
      <h1>13번째 별</h1>
      <p class="sub">가을, 김포</p>
      <p class="scroll-hint">↓ 스크롤</p>
    </section>

    <main id="story" aria-live="polite"></main>

    <footer class="end">
      <p>데모 범위 끝.</p>
      <p style="font-size: 0.75rem; opacity: 0.6">
        본 작품은 인터랙티브 단편 데모입니다. 산문은 형제 폴더의 final/novel.md에서.
      </p>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const story = document.getElementById("story");
        const progress = document.getElementById("progress");
        const beatCounter = document.getElementById("beatCounter");

        if (!window.NOVEL_DATA || !Array.isArray(window.NOVEL_DATA)) {
          story.innerHTML =
            '<section class="beat"><p>데이터 로드 실패. data.js를 확인하세요.</p></section>';
          return;
        }

        // 정점 비트(추적팀 컷이 강조되는) — SVG 시계/파형 추가
        const climaxBeats = new Set([1, 5, "11.5", 12, 13, 14, 15]);

        const clockSvg = `
          <div class="team-clock">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.5"/>
              <line class="clock-hand" x1="12" y1="12" x2="12" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
            </svg>
            <span>째깍</span>
          </div>
        `;

        const waveformSvg = `
          <svg class="team-waveform" viewBox="0 0 320 24" preserveAspectRatio="none" aria-hidden="true">
            <path d="M 0 12 L 20 12 L 25 6 L 30 18 L 35 4 L 40 20 L 45 12 L 80 12 L 85 8 L 92 16 L 100 12 L 160 12 L 165 5 L 170 19 L 175 8 L 180 16 L 185 12 L 240 12 L 245 9 L 250 15 L 255 12 L 320 12"/>
          </svg>
        `;

        const renderColumn = (label, paragraphs, klass, beatId) => {
          if (!paragraphs || paragraphs.length === 0) return "";
          const html = paragraphs.map((p) => `<p>${p}</p>`).join("");
          let extras = "";
          if (klass === "col-team" && climaxBeats.has(beatId)) {
            extras = waveformSvg + clockSvg;
          }
          return `
            <div class="column ${klass}">
              <div class="column-label">${label}</div>
              ${html}
              ${extras}
            </div>
          `;
        };

        window.NOVEL_DATA.forEach((beat) => {
          const section = document.createElement("section");
          section.className = "beat";
          section.id = `beat-${beat.id}`;
          section.dataset.beatId = beat.id;

          const illustrationHtml = beat.illustration
            ? `<figure class="beat-illustration">
                 <img src="${beat.illustration.src}" alt="${beat.illustration.alt || ""}" loading="lazy" />
                 ${beat.illustration.caption ? `<figcaption>${beat.illustration.caption}</figcaption>` : ""}
               </figure>`
            : "";

          section.innerHTML = `
            <header class="beat-header">
              <div class="beat-num">Beat ${beat.id}</div>
              <h2 class="beat-title">${beat.title}</h2>
            </header>
            ${illustrationHtml}
            ${renderColumn("가족", beat.family, "col-family", beat.id)}
            ${renderColumn("외계인", beat.alien, "col-alien", beat.id)}
            ${renderColumn("추적팀", beat.team, "col-team", beat.id)}
          `;

          story.appendChild(section);
        });

        // 비트 카운터 — 현재 viewport 안의 비트
        const totalBeats = window.NOVEL_DATA.length;
        const counterObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                const id = e.target.dataset.beatId;
                beatCounter.textContent = `${id} / ${totalBeats}`;
                beatCounter.classList.add("visible");
              }
            });
          },
          { threshold: 0.4 }
        );
        document
          .querySelectorAll(".beat")
          .forEach((b) => counterObserver.observe(b));

        // 키보드 단축키 (PC) — 다음/이전 비트
        const beats = Array.from(document.querySelectorAll(".beat, .cover, .end"));
        const goToBeat = (offset) => {
          const scroll = window.scrollY + window.innerHeight / 2;
          const currentIdx = beats.findIndex((b) => {
            const rect = b.getBoundingClientRect();
            const top = rect.top + window.scrollY;
            return scroll >= top && scroll < top + rect.height;
          });
          const next = beats[Math.max(0, Math.min(beats.length - 1, currentIdx + offset))];
          if (next) next.scrollIntoView({ behavior: "smooth", block: "start" });
        };
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowDown" || e.key === " " || e.key === "PageDown") {
            e.preventDefault();
            goToBeat(1);
          } else if (e.key === "ArrowUp" || e.key === "PageUp") {
            e.preventDefault();
            goToBeat(-1);
          }
        });

        // 진행 바
        const updateProgress = () => {
          const total = document.body.scrollHeight - window.innerHeight;
          const progressed = total > 0 ? window.scrollY / total : 0;
          progress.style.width = `${Math.min(100, progressed * 100)}%`;
        };

        window.addEventListener("scroll", updateProgress, { passive: true });
        updateProgress();

        // 애니메이션 초기화 (모든 비트가 DOM에 추가된 후)
        if (window.STORY_ANIMATIONS && typeof window.STORY_ANIMATIONS.init === "function") {
          window.STORY_ANIMATIONS.init();
        }
      });
    </script>
  </body>
</html>
